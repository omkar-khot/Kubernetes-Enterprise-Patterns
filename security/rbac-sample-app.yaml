apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-app-sa
  namespace: apps-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sample-app-role
  namespace: apps-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sample-app-rb
  namespace: apps-prod
subjects:
  - kind: ServiceAccount
    name: sample-app-sa
    namespace: apps-prod
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: sample-app-role
