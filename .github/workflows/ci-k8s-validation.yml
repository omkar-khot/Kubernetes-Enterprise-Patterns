name: k8s-validation

on:
  pull_request:
    paths:
      - "apps/**"
      - "platform/**"
      - "security/**"
      - "observability/**"
      - "gitops/**"
      - "policies/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          find . -name "*.yaml" -o -name "*.yml" \
            | xargs kubeconform -summary -strict

      - name: Validate kustomize overlays
        run: |
          sudo apt-get update && sudo apt-get install -y kustomize
          for env in dev stg prod; do
            kustomize build gitops/clusters/$env || exit 1
          done
